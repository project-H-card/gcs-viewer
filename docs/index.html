<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ハイストリーグ試合情報</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="container">
    <!-- タブボタン -->
    <div class="tab-buttons">
      <button id="league-button" class="active" onclick="switchTab('league')">リーグ</button>
      <button id="next-match-button" onclick="switchTab('next-match')">次の試合</button>
      <button id="final-button" onclick="switchTab('final')">決勝</button>
      <button id="total-button" onclick="switchTab('total')">総合表彰</button>
    </div>

    <!-- タブ内容 -->
    <div class="tab-content active" id="league-content">
      <div id="league-section" class="section"></div>
    </div>

    <div class="tab-content" id="next-match-content">
      <div id="next-match-section" class="section"></div>
    </div>

    <div class="tab-content" id="final-content">
      <div id="final-section" class="section"></div>
    </div>

    <div class="tab-content" id="total-content">
      <div id="total-section"></div>
    </div>
  </div>

  <div id="loading">
    <div id="loadingCircle"></div>
  </div>


  <script>
    const apiBaseUrl = "https://script.google.com/macros/s/AKfycbyAR8jQYkOgMWlMVkoJDFbv3r9wLvXadD_PS4ckDNrYt-1YRFbH54p2jrkRrHovELK6cQ/exec";

    function fetchData(action) {
      const loading = document.getElementById('loading');
      loading.style.display = "flex";

      const url = new URL(apiBaseUrl);
      url.searchParams.append('action', action);

      return fetch(url)
        .then((response) => response.json())
        .finally(() => {
          loading.style.display = 'none';
        });
    }

    // タブを切り替える関数
    function switchTab(tab) {
      document.querySelectorAll('.tab-buttons button').forEach((button) => button.classList.remove('active'));
      document.getElementById(`${tab}-button`).classList.add('active');
      document.querySelectorAll('.tab-content').forEach((content) => content.classList.remove('active'));
      document.getElementById(`${tab}-content`).classList.add('active');

      if (tab === 'league') fetchData('getLeagues').then(displayLeagues);
      if (tab === 'next-match') fetchData('getNextMatches').then(displayNextMatches);
      if (tab === 'final') fetchData('getFinalTournament').then(displayFinalTournament);
      if (tab === 'total') fetchData('getTotalRanking').then(displayTotalRanking);
    }

    function displayLeagues(leagues) {
      const section = document.getElementById("league-section");
      section.innerHTML = "";

      leagues.forEach(league => {
        section.appendChild(createLeagueColumn(league));
      });
    }

    function createLeagueColumn(league) {
      const column = document.createElement("div");
      column.className = "column";

      column.appendChild(createTitle(`${league.league}リーグ`));
      column.appendChild(createLeagueTable(league.teams));

      return column;
    }

    function createTitle(text) {
      const h2 = document.createElement("h2");
      h2.textContent = text;
      return h2;
    }

    function createLeagueTable(teams) {
      const table = document.createElement("table");
      table.appendChild(createTableHeader());
      table.appendChild(createTableBody(teams));
      return table;
    }

    function createTableHeader() {
      const thead = document.createElement("thead");
      thead.innerHTML = `
    <tr>
      <th>順位</th>
      <th>チーム</th>
      <th>総合</th>
      <th>予選</th>
      <th>勝ち数</th>
    </tr>
  `;
      return thead;
    }

    function createTableBody(teams) {
      const tbody = document.createElement("tbody");

      teams.forEach((team, index) => {
        const row = document.createElement("tr");

        row.appendChild(createCell(index + 1));
        row.appendChild(createCell(team.teamName));
        row.appendChild(createCell(team.totalPoint));
        row.appendChild(createCell(team.prelimPoint));
        row.appendChild(createCell(team.wins));

        tbody.appendChild(row);
      });

      return tbody;
    }

    function createCell(value) {
      const td = document.createElement("td");
      td.textContent = value ?? "";
      return td;
    }


    function displayNextMatches(data) {
      const section = document.getElementById('next-match-section');
      section.innerHTML = '';

      const leagues = {};
      data.forEach((m) => {
        if (!leagues[m.league]) leagues[m.league] = [];
        leagues[m.league].push(m);
      });
      let tableNumber = 1;

      Object.keys(leagues).forEach((lg) => {
        const col = document.createElement('div');
        col.classList.add('column');

        const title = document.createElement('h2');
        title.textContent = `${lg}リーグ 次の試合`;
        col.appendChild(title);

        const table = document.createElement('table');

        leagues[lg].forEach((m) => {
          table.innerHTML += `
        <tr>
          <th>${tableNumber}</th>
          <td>${m.team1Name}</td>
          <td>vs</td>
          <td>${m.team2Name}</td>
        </tr>
      `;
          tableNumber++;
        });

        col.appendChild(table);
        section.appendChild(col);
      });
    }

    function displayFinalTournament(data) {
      const section = document.getElementById('final-section');
      section.innerHTML = '';

      data.forEach((match) => {
        const col = document.createElement('div');
        col.classList.add('column');

        const title = document.createElement('h2');
        title.textContent = match.matchType;
        col.appendChild(title);

        const table = document.createElement('table');
        table.innerHTML += `
      <tr>
        <td>${match.team1Name}</td>
        <td>vs</td>
        <td>${match.team2Name}</td>
      </tr>
    `;

        if (match.winnerName) {
          table.innerHTML += `
        <tr>
          <th colspan="3">勝者：${match.winnerName}</th>
        </tr>
      `;
        }

        col.appendChild(table);
        section.appendChild(col);
      });
    }

    function displayTotalRanking(data) {
      const section = document.getElementById('total-section');
      section.innerHTML = '';

      const col = document.createElement('div');
      col.classList.add('column');

      const title = document.createElement('h2');
      title.textContent = '総合表彰';
      col.appendChild(title);

      const table = document.createElement('table');
      table.innerHTML = `
    <tr>
      <th>順位</th>
      <th>チーム</th>
      <th>総合ポイント</th>
    </tr>
  `;

      data.forEach((t) => {
        table.innerHTML += `
      <tr>
        <td>${t.rank}</td>
        <td>${t.teamName}</td>
        <td>${t.totalPoint}</td>
      </tr>
    `;
      });

      col.appendChild(table);
      section.appendChild(col);
    }

    // 初期データの取得と表示
    window.onload = function () {
      switchTab('league'); // 最初に表示するタブ
    };
  </script>
</body>

</html>
